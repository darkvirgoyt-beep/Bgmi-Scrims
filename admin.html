<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — VIRGO YT 707</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!--
  Not linked from the public site on purpose. Don't share this URL —
  treat it like a spare key, not a public page. Password is checked
  server-side (Apps Script), but this is a lightweight gate suited for
  keeping casual visitors out, not a defense against a determined
  attacker. Good enough for a hobby tournament site, not a bank.
-->
<style>
  :root{
    --bg:#0a0a0d; --panel:#14131a; --panel-2:#1b1923; --line:#2b2733;
    --gold:#f2c14e; --crimson:#e23b4d; --green:#3ddc84;
    --text:#ece8db; --text-dim:#9b9690;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Manrope',sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased;
    padding:18px; padding-bottom:60px;
  }
  h1,h2,h3{font-family:'Rajdhani',sans-serif; text-transform:uppercase; letter-spacing:0.03em; margin:0;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit; cursor:pointer; touch-action:manipulation;}
  input{font-family:inherit;}

  /* ===== lock screen ===== */
  #lockScreen{max-width:360px; margin:18vh auto 0; text-align:center;}
  #lockScreen h1{font-size:24px; color:var(--gold); margin-bottom:6px;}
  #lockScreen p{color:var(--text-dim); font-size:13px; margin-bottom:24px;}
  #lockScreen input{
    width:100%; background:var(--panel); border:1px solid var(--line); color:var(--text);
    padding:13px 14px; border-radius:6px; font-size:15px; margin-bottom:12px;
  }
  #lockScreen button{
    width:100%; background:var(--gold); color:#16130a; border:none; font-weight:700;
    font-family:'Rajdhani',sans-serif; font-size:15px; letter-spacing:0.05em; text-transform:uppercase;
    padding:13px; border-radius:6px;
  }
  #lockError{color:var(--crimson); font-size:13px; margin-top:10px; display:none;}

  /* ===== dashboard ===== */
  #dashboard{display:none; max-width:560px; margin:0 auto;}
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .topbar h1{font-size:20px; color:var(--gold);}
  .refresh-btn{
    background:var(--panel); border:1px solid var(--line); color:var(--text-dim);
    font-size:12px; padding:8px 14px; border-radius:999px;
  }
  .refresh-btn:active{transform:scale(0.95);}

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:18px; margin-bottom:16px;
  }
  .card h2{font-size:14px; color:var(--text-dim); letter-spacing:0.1em; margin-bottom:14px;}

  /* capacity */
  .cap-row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;}
  .cap-map{font-size:20px; font-weight:700; color:var(--text);}
  .cap-count{font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-dim);}
  .cap-count b{color:var(--gold);}
  .cap-bar{height:8px; border-radius:999px; background:var(--panel-2); overflow:hidden;}
  .cap-bar-fill{height:100%; background:var(--gold); border-radius:999px; transition:width .3s ease;}
  .cap-bar-fill.full{background:var(--crimson);}
  .round-name{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); margin-top:8px;}

  /* map switcher */
  .map-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .map-btn{
    background:var(--panel-2); border:1px solid var(--line); color:var(--text-dim);
    padding:14px 6px; border-radius:8px; font-family:'Rajdhani',sans-serif; font-weight:700;
    font-size:14px; text-transform:uppercase; letter-spacing:0.03em;
  }
  .map-btn:active{transform:scale(0.96);}
  .map-btn.active{background:rgba(242,193,78,0.12); border-color:var(--gold); color:var(--gold);}
  .map-btn .sub{display:block; font-family:'JetBrains Mono',monospace; font-weight:400; font-size:10px; margin-top:4px; opacity:0.8;}

  /* room id form */
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:5px;}
  .field input{
    width:100%; background:var(--bg); border:1px solid var(--line); color:var(--text);
    padding:10px 12px; border-radius:6px; font-size:14px;
  }
  .checkbox-row{display:flex; align-items:center; gap:8px; margin-bottom:14px; font-size:13px;}
  .checkbox-row input{width:16px; height:16px; accent-color:var(--gold);}
  .save-btn{
    width:100%; background:var(--gold); color:#16130a; border:none; font-weight:700;
    font-family:'Rajdhani',sans-serif; font-size:14px; letter-spacing:0.05em; text-transform:uppercase;
    padding:12px; border-radius:6px;
  }
  .save-btn:active{transform:scale(0.98);}
  .save-btn:disabled{opacity:0.4;}
  .action-note{font-size:12px; color:var(--green); margin-top:10px; display:none;}

  /* team cards */
  .team-card{
    background:var(--panel-2); border:1px solid var(--line); border-radius:8px;
    padding:14px; margin-bottom:10px;
  }
  .team-head{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px;}
  .team-name{font-family:'Rajdhani',sans-serif; font-weight:700; font-size:16px; color:var(--text);}
  .status-badge{font-size:10px; padding:3px 9px; border-radius:999px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; flex:none;}
  .status-badge.pending{background:rgba(242,193,78,0.15); color:var(--gold);}
  .status-badge.approved{background:rgba(61,220,132,0.15); color:var(--green);}
  .players-list{font-size:12px; color:var(--text-dim); line-height:1.7; margin-bottom:10px;}
  .players-list b{color:var(--text);}
  .team-meta{font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; margin-bottom:10px;}
  .team-actions{display:flex; gap:8px;}
  .ss-link{
    flex:1; text-align:center; font-size:12px; padding:9px; border-radius:6px;
    border:1px solid var(--line); color:var(--text-dim); text-decoration:none;
  }
  .approve-btn{
    flex:1; background:var(--green); color:#0a1f12; border:none; font-weight:700;
    font-size:12px; padding:9px; border-radius:6px; text-transform:uppercase; letter-spacing:0.04em;
  }
  .approve-btn:disabled{background:var(--panel); color:var(--text-dim);}
  .empty-note{color:var(--text-dim); font-size:13px; text-align:center; padding:20px 0;}
</style>
</head>
<body>

<div id="lockScreen">
  <h1>Admin Access</h1>
  <p>VIRGO YT 707 · Scrim Control Panel</p>
  <input type="password" id="passwordInput" placeholder="Admin password" autocomplete="off">
  <button id="unlockBtn">Unlock</button>
  <div id="lockError">Wrong password — try again.</div>
</div>

<div id="dashboard">
  <div class="topbar">
    <h1>Control Panel</h1>
    <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
  </div>

  <div class="card">
    <h2>Current Round</h2>
    <div class="cap-row">
      <div class="cap-map" id="capMap">—</div>
      <div class="cap-count"><b id="capCount">0</b> / <span id="capMax">0</span> players</div>
    </div>
    <div class="cap-bar"><div class="cap-bar-fill" id="capBarFill"></div></div>
    <div class="round-name" id="roundNameText">—</div>
  </div>

  <div class="card">
    <h2>Switch Active Map</h2>
    <div class="map-grid">
      <button class="map-btn" data-map="erangel" id="mapBtnErangel">Erangel<span class="sub" id="mapSubErangel">max 100</span></button>
      <button class="map-btn" data-map="livik" id="mapBtnLivik">Livik<span class="sub" id="mapSubLivik">max 50</span></button>
      <button class="map-btn" data-map="miramar" id="mapBtnMiramar">Miramar<span class="sub" id="mapSubMiramar">max 100</span></button>
    </div>
  </div>

  <div class="card">
    <h2>Room ID & Lobby Time</h2>
    <div class="field"><label for="roomIdInput">Room ID</label><input id="roomIdInput" type="text" placeholder="e.g. 12345678"></div>
    <div class="field"><label for="roomTimeInput">Lobby Time</label><input id="roomTimeInput" type="text" placeholder="e.g. 8:00 PM IST"></div>
    <div class="checkbox-row">
      <input type="checkbox" id="broadcastCheckbox" checked>
      <label for="broadcastCheckbox">Email this to all Approved teams now</label>
    </div>
    <button class="save-btn" id="saveRoomBtn">Save Room Info</button>
    <div class="action-note" id="roomActionNote"></div>
  </div>

  <div class="card">
    <h2>Registered Teams</h2>
    <div id="teamsList"><div class="empty-note">Loading…</div></div>
  </div>
</div>

<script>
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzd6gJMg0CHK7Yqu7LJqBdBUiGs6HRHHKTMNOe3FbHUmszYx8lywV5RaKOC1J0z8DH8xw/exec"
};

let ADMIN_PASSWORD = null; // kept in memory only for this page session — never stored

document.getElementById('unlockBtn').addEventListener('click', attemptUnlock);
document.getElementById('passwordInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') attemptUnlock();
});

async function attemptUnlock() {
  const pw = document.getElementById('passwordInput').value;
  if (!pw) return;
  const btn = document.getElementById('unlockBtn');
  btn.textContent = 'Checking…';
  btn.disabled = true;

  const data = await fetchAdmin(pw);
  btn.textContent = 'Unlock';
  btn.disabled = false;

  if (!data || data.status === 'unauthorized') {
    document.getElementById('lockError').style.display = 'block';
    return;
  }
  ADMIN_PASSWORD = pw;
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  renderDashboard(data);
}

async function fetchAdmin(password) {
  try {
    const url = CONFIG.APPS_SCRIPT_URL + '?admin=1&password=' + encodeURIComponent(password);
    const res = await fetch(url);
    return await res.json();
  } catch (err) {
    alert('Could not reach the server — check your connection.');
    return null;
  }
}

async function postAdmin(payload) {
  payload.type = 'admin_action';
  payload.password = ADMIN_PASSWORD;
  try {
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    return await res.json();
  } catch (err) {
    alert('Action failed — check your connection and try again.');
    return null;
  }
}

document.getElementById('refreshBtn').addEventListener('click', async function () {
  const data = await fetchAdmin(ADMIN_PASSWORD);
  if (data && data.status !== 'unauthorized') renderDashboard(data);
});

['erangel', 'livik', 'miramar'].forEach(function (map) {
  document.getElementById('mapBtn' + capitalize(map)).addEventListener('click', async function () {
    const result = await postAdmin({ action: 'setActiveMap', map: map });
    if (result && result.status === 'success') {
      const data = await fetchAdmin(ADMIN_PASSWORD);
      if (data) renderDashboard(data);
    }
  });
});

document.getElementById('saveRoomBtn').addEventListener('click', async function () {
  const btn = this;
  btn.disabled = true;
  btn.textContent = 'Saving…';
  const result = await postAdmin({
    action: 'setRoom',
    roomId: document.getElementById('roomIdInput').value.trim(),
    roomTime: document.getElementById('roomTimeInput').value.trim(),
    broadcast: document.getElementById('broadcastCheckbox').checked
  });
  btn.disabled = false;
  btn.textContent = 'Save Room Info';
  const note = document.getElementById('roomActionNote');
  if (result && result.status === 'success') {
    note.textContent = result.sentCount > 0
      ? '✅ Saved — emailed ' + result.sentCount + ' approved team(s).'
      : '✅ Saved.';
    note.style.display = 'block';
    setTimeout(function () { note.style.display = 'none'; }, 4000);
  } else {
    alert('Could not save room info.');
  }
});

async function approveTeam(txnRef, btnEl) {
  btnEl.disabled = true;
  btnEl.textContent = '…';
  const result = await postAdmin({ action: 'approveTeam', txnRef: txnRef });
  if (result && result.status === 'success') {
    const data = await fetchAdmin(ADMIN_PASSWORD);
    if (data) renderDashboard(data);
  } else {
    alert('Could not approve — try refreshing.');
    btnEl.disabled = false;
    btnEl.textContent = 'Approve';
  }
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function renderDashboard(data) {
  const mapMaxes = { erangel: data.erangelMax, livik: data.livikMax, miramar: data.miramarMax };
  const registered = data.teams.length * 4;
  const isFull = registered >= data.mapMax;

  document.getElementById('capMap').textContent = capitalize(data.activeMap);
  document.getElementById('capCount').textContent = registered;
  document.getElementById('capMax').textContent = data.mapMax;
  const pct = data.mapMax > 0 ? Math.min(100, (registered / data.mapMax) * 100) : 0;
  const fill = document.getElementById('capBarFill');
  fill.style.width = pct + '%';
  fill.classList.toggle('full', isFull);
  document.getElementById('roundNameText').textContent = data.roundName;

  ['erangel', 'livik', 'miramar'].forEach(function (map) {
    const btn = document.getElementById('mapBtn' + capitalize(map));
    btn.classList.toggle('active', map === data.activeMap);
    document.getElementById('mapSub' + capitalize(map)).textContent = 'max ' + mapMaxes[map];
  });

  document.getElementById('roomIdInput').value = data.roomId || '';
  document.getElementById('roomTimeInput').value = data.roomTime || '';

  const list = document.getElementById('teamsList');
  if (data.teams.length === 0) {
    list.innerHTML = '<div class="empty-note">No teams registered for this round yet.</div>';
    return;
  }

  list.innerHTML = '';
  data.teams.slice().reverse().forEach(function (t) {
    const isApproved = String(t.status).toLowerCase() === 'approved' || String(t.status).toLowerCase() === 'confirmed';
    const card = document.createElement('div');
    card.className = 'team-card';

    const playersHtml = t.players.map(function (p, i) {
      return '<div><b>P' + (i + 1) + ':</b> ' + escapeHtml(p.name) + ' &middot; UID ' + escapeHtml(p.uid) + '</div>';
    }).join('');

    card.innerHTML =
      '<div class="team-head">' +
        '<div class="team-name">' + escapeHtml(t.team || 'Unnamed Team') + '</div>' +
        '<div class="status-badge ' + (isApproved ? 'approved' : 'pending') + '">' + (isApproved ? 'Approved' : 'Pending') + '</div>' +
      '</div>' +
      '<div class="players-list">' + playersHtml + '</div>' +
      '<div class="team-meta">📱 ' + escapeHtml(t.whatsapp) + ' &middot; Ref: ' + escapeHtml(t.txnRef) + '</div>' +
      '<div class="team-actions">' +
        (t.screenshot && t.screenshot !== 'Not provided'
          ? '<a class="ss-link" href="' + t.screenshot + '" target="_blank" rel="noopener">📎 Screenshot</a>'
          : '<span class="ss-link">No screenshot</span>') +
        '<button class="approve-btn" ' + (isApproved ? 'disabled' : '') + '>' + (isApproved ? '✓ Approved' : 'Approve') + '</button>' +
      '</div>';

    const approveBtn = card.querySelector('.approve-btn');
    if (!isApproved) {
      approveBtn.addEventListener('click', function () { approveTeam(t.txnRef, approveBtn); });
    }
    list.appendChild(card);
  });
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}
</script>
</body>
</html>
